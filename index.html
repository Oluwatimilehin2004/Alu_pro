<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALU_PRO_V22.EXE</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ff00; --bg: #0d1117; }
        * { font-family: 'JetBrains Mono', monospace; box-sizing: border-box; text-transform: lowercase; color: #ffffff; }
        body { background-color: var(--bg); margin: 0; padding: 12px; }
        .container { width: 100%; max-width: 650px; margin: auto; }
        .glass-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        h2 { text-align: center; font-weight: 700; letter-spacing: 2px; }
        
        .input-row { display: grid; grid-template-columns: 1fr 1fr 0.8fr 1.2fr 45px; gap: 8px; margin-bottom: 15px; align-items: end; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 12px; }
        label { display: block; margin-bottom: 6px; color: rgba(255,255,255,0.4); font-size: 11px; }
        input { width: 100%; height: 45px; padding: 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: #000; font-size: 15px; outline: none; text-align: center; }
        
        .type-picker { background: #000; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; }
        .type-menu { display: none; position: absolute; top: 50px; left: 0; width: 100%; background: #1a222c; border: 1px solid #444; border-radius: 6px; z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.6); }
        .type-menu.show { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; padding: 6px; }
        .type-option { padding: 8px; border: 1px solid #333; border-radius: 4px; text-align: center; background: #000; height: 45px; display: flex; align-items: center; justify-content: center; }
        .type-option svg, .selected-display svg { width: 35px; height: 25px; }

        .btn { padding: 16px; border-radius: 12px; border: none; cursor: pointer; width: 100%; font-weight: bold; font-size: 15px; }
        .btn-main { background: #fff; color: #000; margin-top: 15px; }
        .btn-sec { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
        .add-btn { background: #0047AB; color: #fff; width: 45px; height: 45px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; }
        .del-btn { background: #b32d2d; color: #fff; width: 45px; height: 45px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 11px; color: rgba(255,255,255,0.4); padding-bottom: 10px; border-bottom: 2px solid rgba(255,255,255,0.1); }
        td { padding: 12px 4px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .num-cell { text-align: right; font-variant-numeric: tabular-nums; }
        .total-row td { border-top: 2px solid rgba(255,255,255,0.2); font-weight: 700; font-size: 16px; padding-top: 18px; }
    </style>
</head>
<body>

<div id="mainPage" class="container">
    <h2>ALU_PRO_V22.EXE</h2>
    <button class="btn btn-sec" onclick="showPage('settingPage')">SETTINGS</button>
    <div class="glass-card">
        <div id="windowInputs"></div>
        <div style="display: flex; gap: 12px; align-items: center; margin-top: 12px;">
            <div class="add-btn" onclick="addWindow()">+</div>
            <button class="btn btn-sec" style="width: auto; margin:0; padding: 10px 20px;" onclick="clearAll()">clear</button>
        </div>
        <button class="btn btn-main" onclick="calculate()">run_calculation</button>
    </div>
</div>

<div id="resultPage" class="container" style="display:none;">
    <h2>OUTPUT_REPORT</h2>
    <button class="btn btn-sec" onclick="showPage('mainPage')">< return</button>
    <div id="resultArea"></div>
    <button class="btn btn-sec" onclick="window.print()">print pdf</button>
</div>

<div id="settingPage" class="container" style="display:none;">
    <h2>PRICE_DATABASE</h2>
    <div class="glass-card" id="priceInputs" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;"></div>
    <button class="btn btn-main" onclick="savePrices()">save_to_db</button>
</div>

<script>
    const labels = ["top frame", "btm frame", "side frame", "lock frame", "hook frame", "wheel frame", "top cap", "btm cap", "wheel", "hook lock", "weatherstrip", "glass (4x6)", "sqft labor"];
    const defaults = [150800, 200200, 105900, 98300, 98300, 104000, 570, 570, 2800, 13000, 39900, 65000, 9000];

    const windowIcons = {
        '2L': `<svg viewBox="0 0 40 40"><rect x="2" y="2" width="36" height="36" fill="none" stroke="white" stroke-width="2.5"/><line x1="20" y1="2" x2="20" y2="38" stroke="white" stroke-width="2.5"/></svg>`,
        '3L': `<svg viewBox="0 0 40 40"><rect x="2" y="2" width="36" height="36" fill="none" stroke="white" stroke-width="2.5"/><line x1="14" y1="2" x2="14" y2="38" stroke="white" stroke-width="2.5"/><line x1="26" y1="2" x2="26" y2="38" stroke="white" stroke-width="2.5"/></svg>`,
        '4L': `<svg viewBox="0 0 40 40"><rect x="2" y="2" width="36" height="36" fill="none" stroke="white" stroke-width="2.5"/><line x1="11" y1="2" x2="11" y2="38" stroke="white" stroke-width="2.5"/><line x1="20" y1="2" x2="20" y2="38" stroke="white" stroke-width="2.5"/><line x1="29" y1="2" x2="29" y2="38" stroke="white" stroke-width="2.5"/></svg>`
    };

    window.onload = () => { loadSettingsUI(); addWindow(); };

    function addWindow() {
        const container = document.getElementById('windowInputs');
        const div = document.createElement('div');
        div.className = 'input-row';
        div.innerHTML = `
            <div><label>h</label><input type="number" class="h-in" placeholder=""></div>
            <div><label>w</label><input type="number" class="w-in" placeholder=""></div>
            <div><label>qty</label><input type="number" class="q-in" placeholder=""></div>
            <div>
                <label>type</label>
                <div class="type-picker" onclick="toggleMenu(this)">
                    <div class="selected-display">--</div><input type="hidden" class="t-in">
                    <div class="type-menu">
                        <div class="type-option" onclick="selectType(this, '2L')">${windowIcons['2L']}</div>
                        <div class="type-option" onclick="selectType(this, '3L')">${windowIcons['3L']}</div>
                        <div class="type-option" onclick="selectType(this, '4L')">${windowIcons['4L']}</div>
                    </div>
                </div>
            </div>
            <div class="del-btn" onclick="removeRow(this)">x</div>
        `;
        container.appendChild(div);
    }

    function toggleMenu(el) { el.querySelector('.type-menu').classList.toggle('show'); }
    function selectType(opt, val) {
        const picker = opt.closest('.type-picker');
        picker.querySelector('.t-in').value = val;
        picker.querySelector('.selected-display').innerHTML = windowIcons[val];
    }
    function removeRow(btn) { btn.parentElement.remove(); }
    function showPage(id) { document.querySelectorAll('.container').forEach(p=>p.style.display='none'); document.getElementById(id).style.display='block'; }

    function processBarLogic(totalFeet, barPrice) {
        let bars = Math.floor(totalFeet / 20);
        let rem = totalFeet % 20;
        let remAmt = 0;
        let remText = "";
        if (rem > 0) {
            if (rem > 10) bars += 1;
            else if (rem > 6.5) bars += 0.5;
            else if (rem > 5) { remAmt = barPrice/3; remText = rem.toFixed(1)+"'"; }
            else if (rem > 4) { remAmt = barPrice/4; remText = rem.toFixed(1)+"'"; }
            else if (rem > 3) { remAmt = barPrice/5; remText = rem.toFixed(1)+"'"; }
            else if (rem > 2.5) { remAmt = barPrice/6; remText = rem.toFixed(1)+"'"; }
            else if (rem > 2) { remAmt = barPrice/8; remText = rem.toFixed(1)+"'"; }
            else if (rem > 1.5) { remAmt = barPrice/10; remText = rem.toFixed(1)+"'"; }
            else if (rem > 1) { remAmt = barPrice/13; remText = rem.toFixed(1)+"'"; }
            else { remAmt = barPrice/20; remText = rem.toFixed(1)+"'"; }
        }
        let qtyStr = bars > 0 ? (bars % 1 === 0 ? bars : bars.toFixed(1)) + " bar" : "";
        if (remText !== "") qtyStr += (qtyStr !== "" ? " + " : "") + remText;
        return { text: qtyStr || "0", amt: (bars * barPrice) + remAmt };
    }

    function calculate() {
        const rows = document.querySelectorAll('.input-row');
        let data = [];
        rows.forEach(row => {
            const h = row.querySelector('.h-in').value, w = row.querySelector('.w-in').value, q = row.querySelector('.q-in').value, t = row.querySelector('.t-in').value;
            if(h && w && q && t) data.push({ h: parseFloat(h), w: parseFloat(w), q: parseInt(q), t });
        });
        if(!data.length) return alert("fill all boxes!");
        
        const p = JSON.parse(localStorage.getItem('alu_v22_prices') || '{}');
        const getP = (i) => parseFloat(p['v'+i] || defaults[i-1]);

        let sum = { top:0, btm:0, side:0, lock:0, hook:0, wheelF:0, caps:0, wheels:0, locks:0, weatherFt:0, glassSht:0, totalSqft:0 };
        data.forEach(d => {
            sum.totalSqft += d.h * d.w * d.q;
            let leave = parseInt(d.t[0]);
            let wPart = d.w / leave;
            sum.top += d.w * d.q; sum.btm += d.w * d.q; sum.side += (d.h * 2) * d.q;
            
            // Logic for Lock Frames
            let currentLockTotal = (d.h * (d.t === '4L' ? 4 : 2)) * d.q;
            sum.lock += currentLockTotal;
            sum.hook += (d.h * (d.t === '3L' ? 4 : (d.t === '4L' ? 4 : 2))) * d.q;
            sum.wheelF += (wPart * leave * 2) * d.q;
            sum.caps += (leave * 2) * d.q; sum.wheels += (leave * 2) * d.q;
            sum.locks += (d.t === '4L' ? 3 : 2) * d.q;
            sum.glassSht += (d.h * wPart * leave / 24) * d.q;
        });

        // Specific Weatherstrip Logic from User
        // Step 1: Calculate total Lock bars needed
        let lockRes = processBarLogic(sum.lock, getP(4));
        let lockBarsCount = lockRes.text.includes("bar") ? parseFloat(lockRes.text.split(" ")[0]) : 0;
        
        // Step 2: Convert to feet (x20) and double it (x2)
        let wstripTotalFeet = (lockBarsCount * 20) * 2;
        
        // Step 3: Round up to next 50' interval
        let finalWstripFeet = Math.ceil(wstripTotalFeet / 50) * 50;
        if(finalWstripFeet === 0 && lockBarsCount > 0) finalWstripFeet = 50;

        let htm = `<div class="glass-card"><table><thead><tr><th>item</th><th class="num-cell">qty</th><th class="num-cell">price</th><th class="num-cell">amount</th></tr></thead><tbody>`;
        let grandTotal = 0;

        const alum = [
            { n: "top frame", ft: sum.top, p: getP(1) }, { n: "btm frame", ft: sum.btm, p: getP(2) },
            { n: "side frame", ft: sum.side, p: getP(3) }, { n: "lock frame", ft: sum.lock, p: getP(4) },
            { n: "hook frame", ft: sum.hook, p: getP(5) }, { n: "wheel frame", ft: sum.wheelF, p: getP(6) }
        ];
        alum.forEach(i => {
            let res = processBarLogic(i.ft, i.p);
            htm += `<tr><td>${i.n}</td><td class="num-cell">${res.text}</td><td class="num-cell">${i.p.toLocaleString()}</td><td class="num-cell">${Math.ceil(res.amt).toLocaleString()}</td></tr>`;
            grandTotal += res.amt;
        });

        const acc = [
            { n: "top cap", q: sum.caps + " pc", a: sum.caps * getP(7), p: getP(7) },
            { n: "btm cap", q: sum.caps + " pc", a: sum.caps * getP(8), p: getP(8) },
            { n: "wheel", q: sum.wheels + " pc", a: sum.wheels * getP(9), p: getP(9) },
            { n: "hook lock", q: sum.locks + " pc", a: sum.locks * getP(10), p: getP(10) },
            { n: "weatherstrip", q: finalWstripFeet + "'", a: (finalWstripFeet/300) * getP(11), p: getP(11) },
            { n: "glass", q: finalGlass = (sum.glassSht % 1 <= 0.5 && sum.glassSht % 1 > 0 ? Math.floor(sum.glassSht) + 0.5 : Math.ceil(sum.glassSht)) + " sht", a: parseFloat(finalGlass) * getP(12), p: getP(12) },
            { n: "labor", q: sum.totalSqft.toFixed(1) + " sq", a: sum.totalSqft * getP(13), p: getP(13) }
        ];
        acc.forEach(i => {
            htm += `<tr><td>${i.n}</td><td class="num-cell">${i.q}</td><td class="num-cell">${i.p.toLocaleString()}</td><td class="num-cell">${Math.ceil(i.a).toLocaleString()}</td></tr>`;
            grandTotal += i.a;
        });

        htm += `<tr class="total-row"><td>total</td><td colspan="3" class="num-cell">${Math.ceil(grandTotal).toLocaleString()}</td></tr>`;
        htm += `<tr><td style="color:var(--accent)">avg/sqft</td><td colspan="3" class="num-cell" style="color:var(--accent)">${Math.ceil(grandTotal/sum.totalSqft).toLocaleString()}</td></tr></tbody></table></div>`;
        document.getElementById('resultArea').innerHTML = htm;
        showPage('resultPage');
    }

    function loadSettingsUI() {
        let htm = ""; labels.forEach((l, i) => { htm += `<div><label>${l}</label><input type="number" id="p${i+1}" value="${defaults[i]}"></div>`; });
        document.getElementById('priceInputs').innerHTML = htm;
        let s = localStorage.getItem('alu_v22_prices');
        if(s) { let p = JSON.parse(s); labels.forEach((_, i) => { document.getElementById('p'+(i+1)).value = p['v'+(i+1)]; }); }
    }
    function savePrices() {
        let p = {}; labels.forEach((_, i) => { p['v'+(i+1)] = document.getElementById('p'+(i+1)).value; });
        localStorage.setItem('alu_v22_prices', JSON.stringify(p)); showPage('mainPage');
    }
    function clearAll() { if(confirm("clear all?")) { document.getElementById('windowInputs').innerHTML=''; addWindow(); } }
</script>
</body>
    </html>
