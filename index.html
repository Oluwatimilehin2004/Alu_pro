<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alu Multi Pro - Stable</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 15px; text-transform: lowercase; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        h2 { color: #00ff00; text-align: center; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: #2a2a2a; padding: 10px; border-radius: 10px; }
        input { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: #00ff00; border-radius: 5px; }
        label { font-size: 11px; color: #aaa; display: block; margin-bottom: 5px; }
        .btn { padding: 15px; width: 100%; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-calc { background: #00ff00; color: #000; font-size: 18px; }
        .btn-add { background: #444; color: #fff; width: 50px; height: 50px; font-size: 24px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e1e1e; }
        th, td { border: 1px solid #333; padding: 12px; text-align: left; }
        th { background: #2a2a2a; color: #00ff00; }
        .total { font-size: 20px; color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Alu Multi Pro</h2>
    <div id="input-container"></div>
    <div style="display: flex; align-items: center; gap: 15px;">
        <button class="btn-add" onclick="addRow()">+</button>
        <span>Add New Window</span>
    </div>
    <button class="btn btn-calc" onclick="doCalculate()">Calculate (တွက်ချက်မည်)</button>
</div>

<div id="result-area"></div>

<script>
    // စစချင်း row တစ်ခု ထည့်ပေးထားမယ်
    window.onload = () => { addRow(); };

    function addRow() {
        const div = document.createElement('div');
        div.className = 'row';
        div.innerHTML = `
            <div style="flex:1"><label>Height (ft)</label><input type="number" class="h-val"></div>
            <div style="flex:1"><label>Width (ft)</label><input type="number" class="w-val"></div>
            <div style="flex:1"><label>Qty</label><input type="number" class="q-val" value="1"></div>
            <button onclick="this.parentElement.remove()" style="background:red; color:white; border:none; padding:10px; border-radius:5px;">X</button>
        `;
        document.getElementById('input-container').appendChild(div);
    }

    function doCalculate() {
        const hs = document.querySelectorAll('.h-val'), ws = document.querySelectorAll('.w-val'), qs = document.querySelectorAll('.q-val');
        let totalSqft = 0;
        
        hs.forEach((h, i) => {
            if(h.value && ws[i].value) {
                totalSqft += parseFloat(h.value) * parseFloat(ws[i].value) * (parseInt(qs[i].value) || 1);
            }
        });

        if(totalSqft === 0) return alert("Data အရင်ရိုက်ပါ ဆရာ");

        let laborRate = 9000; // ဆရာ့သတ်မှတ်ချက်အတိုင်း
        let totalCost = totalSqft * laborRate;

        let res = `
            <div class="card">
                <h3>Calculation Result</h3>
                <table>
                    <thead>
                        <tr><th>Description</th><th>Unit</th><th>Amount</th></tr>
                    </thead>
                    <tbody>
                        <tr><td>Total Measurement</td><td>${totalSqft.toFixed(2)} SQFT</td><td>-</td></tr>
                        <tr><td>Labor & Consumables</td><td>${laborRate.toLocaleString()} K</td><td>${(totalSqft * laborRate).toLocaleString()} K</td></tr>
                        <tr style="background:#000;"><td class="total">Final Estimate</td><td></td><td class="total">${totalCost.toLocaleString()} K</td></tr>
                    </tbody>
                </table>
                <button class="btn" style="background:#333; color:white;" onclick="window.print()">Save as PDF</button>
            </div>
        `;
        document.getElementById('result-area').innerHTML = res;
    }
</script>

</body>
</html>
